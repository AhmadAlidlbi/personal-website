<section class="experience-page section">
  <div class="container">
    <div class="section-header">
      <p class="eyebrow">Experience</p>
      <h1>Professional experience in Angular, mobile UI, and web delivery</h1>
      <p>
        My background covers Angular frontend work, mobile UI implementation, and website and CMS
        maintenance across production team environments.
      </p>
    </div>

    <div class="experience-page__list">
      @for (experience of experiences; track experience.role) {
      <app-experience-card
        [role]="experience.role"
        [company]="experience.company"
        [period]="experience.period"
        [details]="experience.details"
      ></app-experience-card>
      }
    </div>
  </div>
</section>
